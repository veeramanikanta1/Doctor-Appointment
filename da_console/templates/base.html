<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>

<center><h4>DOCTORS</h4></center>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">

    <!-- Logo / Brand -->
    <a class="navbar-brand font-weight-bold" href="#">Doctors Web</a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-center">

        {% if user.is_authenticated %}

        <!-- Username -->
        <li class="nav-item mr-3 text-white font-weight-bold">
            <i class="fas fa-user-circle mr-1"></i> {{ user.username }}
        </li>

        <!-- Logout -->
        <li class="nav-item">
          <a href="javascript:{document.getElementById('logout').submit()}" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt mr-1"></i> Logout
          </a>

          <form action="{% url 'logout' %}" method="post" id="logout">
            {% csrf_token %}
          </form>
        </li>

        {% else %}

         Register
        <li class="nav-item">
          <a href="{% url 'register' %}" class="btn btn-success btn-sm mr-2">
            <i class="fas fa-user-plus"></i> Register
          </a>
        </li>

        <!-- Login -->
        <li class="nav-item">
          <a href="{% url 'login' %}" class="btn btn-primary btn-sm">
            <i class="fas fa-sign-in-alt"></i> Login
          </a>
        </li>

        {% endif %}

      </ul>
    </div>

  </div>
</nav>
{% block content %}

{% endblock %}

</body>
</html>
